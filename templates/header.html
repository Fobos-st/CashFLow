<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="/" aria-label="CashFlow — на главную">CashFlow</a>
    <div class="header-right">
    {% if request.resolver_match.url_name not in "login register" %}
      <div class="account-switcher" id="accountSwitcher">
        <button class="btn btn-ghost" id="accountBtn" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="account-label">Счёт:</span>
          <span class="account-name-header" id="accountName">{{ account.name }}</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>

        <div class="menu" id="accountMenu" role="menu" aria-label="Выбор счёта">
          {% for other_account in user.personal_account.all %}
            {% if other_account.id != account.id %}
              <a href="/{{other_account.id}}/" class="menu-item" type="button" data-account="{{ other_account.name }}" role="menuitem">{{ other_account.name }}</a>
            {% endif %}
          {% endfor %}
          <div class="menu-sep" role="separator"></div>
          <button class="menu-item menu-item-accent" type="button" id="addAccountBtn" role="menuitem">+ Добавить счёт</button>
        </div>
      </div>
      <a class="btn btn-ghost" href="/settings" id="settingsBtn">*</a>
    </div>
    {% endif %}
  </div>
</header>
